name: Linter

on: pull_request

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - run: pip install --user ruff
    - run: ruff --format=github .
    - name: black
      uses: reviewdog/action-black@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        level: warning
        filter_mode: diff_context
